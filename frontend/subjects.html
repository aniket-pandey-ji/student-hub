<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>My Subjects - Student Hub</title>
      <link rel="stylesheet" href="style.css">
</head>

<body>
      <header class="topbar">
      </header>

      <main id="main" role="main">
            <div class="page-header">
                  <h1>My Subjects</h1>
                  <p>Add, view, and manage all your courses and subjects here.</p>
            </div>

            <div class="card add-subject-form">
                  <h3>Add a New Subject</h3>
                  <form id="subject-form">
                        <div class="form-group">
                              <label for="subject-name">Subject Name</label>
                              <input type="text" id="subject-name" placeholder="e.g., Computer Networks" required>
                        </div>
                        <div class="form-group">
                              <label for="subject-description">Description (Optional)</label>
                              <input type="text" id="subject-description" placeholder="A brief description">
                        </div>
                        <button type="submit" class="btn primary">Add Subject</button>
                  </form>
            </div>

            <h2 class="section-title">Your Subjects List</h2>
            <div id="subjects-list" class="subject-grid">
                  <p class="muted">Loading your subjects...</p>
            </div>
      </main>

      <footer class="site-footer">
      </footer>

      <script>
            document.addEventListener('DOMContentLoaded', () => {
                  const token = localStorage.getItem('token');
                  const API_BASE_URL = localStorage.getItem('api_base_url') || 'http://localhost:3000';
                  if (!token) {
                        window.location.href = 'login.html';
                        return;
                  }

                  const subjectForm = document.getElementById('subject-form');
                  const subjectsList = document.getElementById('subjects-list');

                  // Function to fetch and display subjects
                  const loadSubjects = async () => {
                        try {
                              const response = await fetch(`${API_BASE_URL}/api/subjects`, {
                                    headers: { 'Authorization': `Bearer ${token}` }
                              });
                              if (!response.ok) throw new Error('Failed to load subjects.');
                              const subjects = await response.json();

                              subjectsList.innerHTML = '';
                              if (subjects.length === 0) {
                                    subjectsList.innerHTML = '<p class="muted">You have not added any subjects yet.</p>';
                                    return;
                              }

                              subjects.forEach(subject => {
                                    const subjectCard = document.createElement('a');
                                    subjectCard.className = 'subject-card';
                                    // This line creates the link to the detail page, passing the subject's ID
                                    subjectCard.href = `subject-detail.html?id=${subject._id}`;
                                    subjectCard.innerHTML = `
                        <h3>${subject.name}</h3>
                        <p class="muted">${subject.description || 'No description provided.'}</p>
                        <button class="delete-btn" type="button" data-id="${subject._id}" aria-label="Delete subject">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.134-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.067-2.09 1.02-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
</button>
                    `;
                                    subjectsList.appendChild(subjectCard);
                              });
                        } catch (error) {
                              console.error('Failed to load subjects:', error);
                              subjectsList.innerHTML = '<p class="muted">Could not load subjects right now.</p>';
                        }
                  };

                  // Form submit hone par naya subject add karein
                  subjectForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const name = document.getElementById('subject-name').value;
                        const description = document.getElementById('subject-description').value;

                        try {
                              const createRes = await fetch(`${API_BASE_URL}/api/subjects`, {
                                    method: 'POST',
                                    headers: {
                                          'Content-Type': 'application/json',
                                          'Authorization': `Bearer ${token}`
                                    },
                                    body: JSON.stringify({ name, description })
                              });
                              if (!createRes.ok) throw new Error('Failed to create subject.');

                              subjectForm.reset();
                              loadSubjects(); // List ko refresh karein
                        } catch (error) {
                              console.error('Failed to create subject:', error);
                              alert('Could not add subject. Please try again.');
                        }
                  });

                  // Delete button par click handle karein
                  subjectsList.addEventListener('click', async (e) => {
                        const deleteBtn = e.target.closest('.delete-btn');
                        if (deleteBtn) {
                              e.preventDefault();
                              const subjectId = deleteBtn.getAttribute('data-id');
                              if (confirm('Are you sure you want to delete this subject?')) {
                                    try {
                                          const deleteRes = await fetch(`${API_BASE_URL}/api/subjects/${subjectId}`, {
                                                method: 'DELETE',
                                                headers: { 'Authorization': `Bearer ${token}` }
                                          });
                                          if (!deleteRes.ok) throw new Error('Failed to delete subject.');
                                          loadSubjects(); // List ko refresh karein
                                    } catch (error) {
                                          console.error('Failed to delete subject:', error);
                                          alert('Could not delete subject. Please try again.');
                                    }
                              }
                        }
                  });

                  // Page load hone par subjects load karein
                  loadSubjects();
            });
      </script>
</body>

</html>
